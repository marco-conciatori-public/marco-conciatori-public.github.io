# Site-wide configuration for Jekyll (GitHub Pages builds the site with this).
title: Mantis - Robot Showcase
description: A small robot with many capabilities, built as a personal project to explore AI and robotics.

# Absolute site URL (used to build canonical and social-share links).
url: "https://marco-conciatori-public.github.io"
# Served at the domain root (user page), so the path prefix is empty. Setting
# this explicitly stops the github-metadata plugin from trying to resolve it
# from the GitHub API, which fails the production build with no token.
baseurl: ""
# Default preview image for link shares (1200x630, cropped by Cloudinary).
og_image: "https://res.cloudinary.com/dywsmv4ow/image/upload/w_1200,h_630,c_fill,g_auto,f_jpg,q_auto/v1755544824/IMG_20250817_153907_eixrsu.jpg"

# Jekyll plugins. jekyll-sitemap ships with the github-pages gem and generates
# /sitemap.xml so search engines can discover every page.
plugins:
  - jekyll-sitemap

# Files that should not be published as part of the site.
# NOTE: setting `exclude` replaces Jekyll's defaults, so the build-tooling and
# dependency entries (node_modules, Gemfile, vendor, ...) must be listed here
# explicitly or they would be copied into the deployed site.
exclude:
  - README.md
  - CLAUDE.md
  - node_modules
  - vendor
  - Gemfile
  - Gemfile.lock
  - package.json
  - package-lock.json
  - tailwind.config.js
  - _tailwind
  - .sass-cache
  - .jekyll-cache
